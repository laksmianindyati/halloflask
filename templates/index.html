<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empat Peta Interaktif</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .map-container {
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Pastikan tidak ada overflow yang memotong peta */
        }
        .map {
            width: 100%;
            height: 400px; /* Atur ketinggian sesuai kebutuhan */
        }
        .map-title {
            background-color: #f0f0f0;
            padding: 10px;
            margin: 0;
            border-bottom: 1px solid #ccc;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Perkebunan Kelapa Sawit di Indonesia</h1>
        
        <div class="map-container">
            <h2 class="map-title">Luas Perkebunan Kelapa Sawit</h2>
            <div id="map1" class="map">
                {{ plot1|safe }}
            </div>
        </div>
        
        <div class="map-container">
            <h2 class="map-title">SDM di Perkebunan Kelapa Sawit</h2>
            <div id="map2" class="map">
                {{ plot2|safe }}
            </div>
        </div>
        
        <div class="map-container">
            <h2 class="map-title">Kondisi Tanaman Kelapa Sawit</h2>
            <div id="map3" class="map">
                {{ plot3|safe }}
            </div>
        </div>
        
        <div class="map-container">
            <h2 class="map-title">Produksi Kelapa Sawit</h2>
            <div id="map4" class="map">
                {{ plot4|safe }}
            </div>
        </div>
    </div>
</body>
</html>
